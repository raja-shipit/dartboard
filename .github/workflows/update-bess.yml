name: Update BESS Data from EIA API

on:
  schedule:
    - cron: '0 8 1 * *'    # 1st of every month
    - cron: '0 8 15 * *'   # 15th (catches delayed EIA releases)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual force update from dashboard'
  repository_dispatch:
    types: [update-bess-data]

jobs:
  update-bess:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Pull BESS data from EIA API
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python3 .github/scripts/update_bess.py

      - name: Commit and push
        run: |
          git config user.name  "Dartboard Fletch Bot"
          git config user.email "bot@dartboard.energy"
          git add bess_plants.js metadata.json
          if git diff --staged --quiet; then
            echo "No changes — data already current"
          else
            # Check record count before pushing (0-record guard)
            SITE_COUNT=$(python3 -c "
import json
try:
    data = json.loads(open('bess_plants.js').read().split('=',1)[1].rstrip(';').strip())
    print(len(data))
except:
    print(0)
")
            echo "Site count: $SITE_COUNT"
            if [ "$SITE_COUNT" -lt 100 ]; then
              echo "GUARD: Only $SITE_COUNT records — refusing to push (prevents blank map)"
              exit 1
            fi
            git commit -m "data: auto-update BESS from EIA API [$(date -u '+%Y-%m-%d')] — $SITE_COUNT sites"
            git push
            echo "Pushed $SITE_COUNT sites to GitHub Pages"
          fi
